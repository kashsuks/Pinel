name: Release

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      base_version: ${{ steps.check.outputs.base_version }}
      publish_version: ${{ steps.check.outputs.publish_version }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      release_name: ${{ steps.check.outputs.release_name }}
      release_channel: ${{ steps.check.outputs.release_channel }}
      aur_version: ${{ steps.check.outputs.aur_version }}
      aur_source_pkgname: ${{ steps.check.outputs.aur_source_pkgname }}
      aur_binary_pkgname: ${{ steps.check.outputs.aur_binary_pkgname }}
      binary_name: ${{ steps.check.outputs.binary_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: check
        shell: bash
        run: |
          base_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)
          binary_name=$(sed -n 's/^name = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_channel="dev"
            publish_version="${base_version}-dev.${{ github.run_number }}"
            release_tag="v${publish_version}"
            release_name="v${base_version} @dev"
            aur_version="${base_version}_dev.${{ github.run_number }}"
            aur_source_pkgname="pinel-dev"
            aur_binary_pkgname="pinel-bin-dev"
            should_release="true"
          else
            release_channel="stable"
            publish_version="${base_version}"
            release_tag="v${base_version}"
            release_name="v${base_version} @stable"
            aur_version="${base_version}"
            aur_source_pkgname="pinel"
            aur_binary_pkgname="pinel-bin"

            if curl -sfL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${release_tag}" \
              >/dev/null; then
              should_release="false"
            else
              should_release="true"
            fi
          fi

          {
            echo "should_release=${should_release}"
            echo "base_version=${base_version}"
            echo "publish_version=${publish_version}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "release_channel=${release_channel}"
            echo "aur_version=${aur_version}"
            echo "aur_source_pkgname=${aur_source_pkgname}"
            echo "aur_binary_pkgname=${aur_binary_pkgname}"
            echo "binary_name=${binary_name}"
          } >> "$GITHUB_OUTPUT"

  create-release:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release shell
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          prerelease: ${{ needs.prepare-release.outputs.release_channel == 'dev' }}
          body: |
            Release: ${{ needs.prepare-release.outputs.release_name }}
            Tag: ${{ needs.prepare-release.outputs.release_tag }}
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    needs: [prepare-release, create-release]
    if: needs.prepare-release.outputs.should_release == 'true'
    uses: ./.github/workflows/release-linux.yml
    with:
      binary_name: ${{ needs.prepare-release.outputs.binary_name }}
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
    secrets: inherit

  windows:
    needs: [prepare-release, create-release]
    if: needs.prepare-release.outputs.should_release == 'true'
    uses: ./.github/workflows/release-windows.yml
    with:
      binary_name: ${{ needs.prepare-release.outputs.binary_name }}
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
    secrets: inherit

  macos:
    needs: [prepare-release, create-release]
    if: needs.prepare-release.outputs.should_release == 'true'
    uses: ./.github/workflows/release-macos.yml
    with:
      binary_name: ${{ needs.prepare-release.outputs.binary_name }}
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
    secrets: inherit

  crates:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    uses: ./.github/workflows/release-crates.yml
    with:
      release_channel: ${{ needs.prepare-release.outputs.release_channel }}
      publish_version: ${{ needs.prepare-release.outputs.publish_version }}
    secrets: inherit

  aur:
    needs: [prepare-release, linux]
    if: needs.prepare-release.outputs.should_release == 'true'
    uses: ./.github/workflows/release-aur.yml
    with:
      aur_version: ${{ needs.prepare-release.outputs.aur_version }}
      aur_source_pkgname: ${{ needs.prepare-release.outputs.aur_source_pkgname }}
      aur_binary_pkgname: ${{ needs.prepare-release.outputs.aur_binary_pkgname }}
      binary_name: ${{ needs.prepare-release.outputs.binary_name }}
      release_channel: ${{ needs.prepare-release.outputs.release_channel }}
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
    secrets: inherit
