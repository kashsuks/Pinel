name: Release Linux

on:
  workflow_call:
    inputs:
      binary_name:
        required: true
        type: string
      release_tag:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  release-linux:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            asset_suffix: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          cp \
            target/${{ matrix.target }}/release/${{ inputs.binary_name }} \
            target/${{ inputs.binary_name }}-${{ matrix.asset_suffix }}

      - name: Upload asset to release
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ inputs.binary_name }}-${{ matrix.asset_suffix }}
          tag_name: ${{ inputs.release_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
