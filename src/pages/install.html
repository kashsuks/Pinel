<section class="install-hero">
  <h1>Install Pinel</h1>
  <p class="install-subtitle">Get started in seconds</p>
</section>

<section class="install-section">
  <div class="current-download">
    <h3>Current Version</h3>
    <a href="#" class="download-link" id="downloadLink">
      <span class="download-platform-text">Download for your platform</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
    </a>
  </div>

  <p class="other-ways">
    <a href="/docs/#getting-started">Other ways to install</a>
  </p>
</section>

<script>
(function() {
  var downloadLink = document.getElementById('downloadLink');
  if (!downloadLink) return;
  
  var ua = navigator.userAgent;
  var platformSpan = downloadLink.querySelector('.download-platform-text');
  var base = 'https://github.com/kashsuks/Pinel/releases/latest/download/';

  if (/Mac/i.test(ua)) {
    var arch = /arm|aarch/i.test(ua) || (typeof navigator.userAgentData !== 'undefined' && navigator.userAgentData.architecture === 'arm') ? 'arm64' : 'x86_64';
    platformSpan.textContent = 'Download for macOS (' + arch + ')';
    downloadLink.href = base + 'pinel-macos-' + arch;
  } else if (/Win/i.test(ua)) {
    platformSpan.textContent = 'Download for Windows (x86_64)';
    downloadLink.href = base + 'pinel-windows-x86_64.exe';
  } else if (/Linux/i.test(ua)) {
    var arch = /aarch64|arm64/i.test(ua) ? 'arm64' : 'x86_64';
    platformSpan.textContent = 'Download for Linux (' + arch + ')';
    downloadLink.href = base + 'pinel-linux-' + arch;
  } else {
    platformSpan.textContent = 'Download';
  }
})();
</script>
